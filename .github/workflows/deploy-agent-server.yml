name: Deploy Agent Server to GCP VM

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH key
        run: |
          if [ -z "${{ secrets.GCP_VM_HOST }}" ] || [ -z "${{ secrets.GCP_VM_USER }}" ]; then
            echo "Missing required secrets: GCP_VM_HOST, GCP_VM_USER"
            exit 1
          fi

          if [ -z "${{ secrets.GCP_VM_SSH_KEY }}" ] && [ -z "${{ secrets.GCP_VM_SSH_KEY_B64 }}" ]; then
            echo "Missing SSH key secret: set GCP_VM_SSH_KEY or GCP_VM_SSH_KEY_B64"
            exit 1
          fi

          mkdir -p ~/.ssh

          if [ -n "${{ secrets.GCP_VM_SSH_KEY_B64 }}" ]; then
            CLEAN_B64=$(printf '%s' "${{ secrets.GCP_VM_SSH_KEY_B64 }}" | tr -d '\r\n\t ')
            printf '%s' "$CLEAN_B64" | base64 -d > ~/.ssh/id_rsa
          else
            printf '%s\n' "${{ secrets.GCP_VM_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          fi

          chmod 600 ~/.ssh/id_rsa

          if ! grep -q "BEGIN OPENSSH PRIVATE KEY" ~/.ssh/id_rsa; then
            echo "Decoded key is not OpenSSH private key. Recreate GCP_VM_SSH_KEY_B64 from: base64 -w0 ~/.ssh/wzd_actions"
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "Invalid SSH private key format in secret (parse failed)."
            exit 1
          fi

          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH connectivity check
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "echo SSH_OK"

      - name: Install rsync on remote VM
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "command -v rsync >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y rsync)"

      - name: Upload changed files
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            ./ "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}:/opt/wzd-app"

      - name: Run remote deploy script
        run: |
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "chmod +x /opt/wzd-app/scripts/deploy-agent-server.sh && APP_DIR=/opt/wzd-app BRANCH=main /opt/wzd-app/scripts/deploy-agent-server.sh"
