name: Deploy Agent Server to GCP VM

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.GCP_VM_HOST }}" ] || [ -z "${{ secrets.GCP_VM_USER }}" ] || [ -z "${{ secrets.GCP_VM_PRIVATE_KEY }}" ]; then
            echo "Missing required secrets: GCP_VM_HOST, GCP_VM_USER, GCP_VM_PRIVATE_KEY"
            exit 1
          fi

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_VM_PRIVATE_KEY }}

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH connectivity check
        run: |
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "echo SSH_OK"

      - name: Upload changed files (tar over ssh)
        run: |
          REMOTE_APP_DIR="/home/${{ secrets.GCP_VM_USER }}/wzd-app"
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "mkdir -p $REMOTE_APP_DIR"

          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            -czf - . | \
          ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" "tar -xzf - -C $REMOTE_APP_DIR"

      - name: Run remote deploy script
        run: |
          REMOTE_APP_DIR="/home/${{ secrets.GCP_VM_USER }}/wzd-app"
          ssh -o IdentitiesOnly=yes "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "bash -lc 'chmod +x $REMOTE_APP_DIR/scripts/deploy-agent-server.sh && APP_DIR=$REMOTE_APP_DIR BRANCH=main $REMOTE_APP_DIR/scripts/deploy-agent-server.sh'"
